<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic 2D</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111827; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #e5e7eb; }

    /* Three.js canvas container */
    #canvas-container {
      position: fixed; inset: 0;
      display: none;
    }

    /* Upload screen */
    #upload-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
    }
    #upload-screen h1 { font-size: 1.8rem; font-weight: 700; color: #f9fafb; }
    #upload-screen p  { color: #9ca3af; font-size: 0.95rem; }
    #drop-zone {
      width: 360px; padding: 48px 32px;
      border: 2px dashed #374151;
      border-radius: 16px;
      text-align: center; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #6366f1;
      background: rgba(99,102,241,.07);
    }
    #drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }
    #drop-zone .hint { font-size: 0.8rem; color: #6b7280; margin-top: 8px; }

    /* Region editor screen */
    #editor-screen {
      position: fixed; inset: 0;
      display: none; flex-direction: row;
    }
    #editor-canvas-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #0f172a;
      display: flex; align-items: center; justify-content: center;
    }
    #editor-img {
      max-width: 100%; max-height: 100%;
      display: block; user-select: none; -webkit-user-drag: none;
    }
    #region-canvas {
      position: absolute; top: 0; left: 0;
      pointer-events: none;
    }
    #editor-overlay-canvas {
      position: absolute; top: 0; left: 0;
      cursor: crosshair;
    }

    /* ── Editor toolbar ── */
    #editor-toolbar {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 2px;
      background: rgba(15,23,42,.88);
      border: 1px solid #374151;
      border-radius: 10px; padding: 4px;
      backdrop-filter: blur(10px);
      z-index: 20; user-select: none;
    }
    .tool-btn {
      width: 38px; height: 38px;
      background: transparent; border: none; border-radius: 7px;
      color: #9ca3af; font-size: 1.15rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s;
    }
    .tool-btn:hover { background: rgba(255,255,255,.08); color: #e5e7eb; }
    .tool-btn.active { background: #6366f1; color: #fff; }
    .tool-sep {
      width: 1px; background: #374151; margin: 5px 2px;
    }
    #editor-panel {
      width: 260px; min-width: 260px;
      background: #1f2937;
      border-left: 1px solid #374151;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    #editor-panel h2 {
      padding: 16px; font-size: 1rem; font-weight: 600;
      border-bottom: 1px solid #374151;
    }
    .panel-section { padding: 12px 16px; border-bottom: 1px solid #374151; }
    .panel-section label { font-size: 0.78rem; color: #9ca3af; display: block; margin-bottom: 6px; }
    select, input[type=range] {
      width: 100%; background: #111827; color: #e5e7eb;
      border: 1px solid #374151; border-radius: 6px;
      padding: 6px 8px; font-size: 0.85rem;
    }
    input[type=range] { padding: 4px 0; cursor: pointer; }
    .region-item {
      padding: 7px 8px; margin-bottom: 6px;
      background: #111827; border-radius: 8px;
      font-size: 0.82rem;
    }
    .region-item-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .region-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .region-item-header span { flex: 1; }
    .region-del {
      cursor: pointer; color: #6b7280; font-size: 1rem; line-height: 1;
      padding: 2px 4px; border-radius: 4px;
    }
    .region-del:hover { color: #ef4444; background: rgba(239,68,68,.1); }
    /* per-region sliders */
    .region-sliders { display: flex; flex-direction: column; gap: 4px; }
    .rslider-row {
      display: grid; grid-template-columns: 28px 1fr 26px;
      align-items: center; gap: 6px;
    }
    .rslider-label { font-size: 0.7rem; color: #6b7280; }
    .rslider-row input[type=range] {
      width: 100%; padding: 2px 0; cursor: pointer;
      accent-color: #6366f1;
    }
    .rslider-val { font-size: 0.68rem; color: #4b5563; text-align: right; }
    #regions-list { padding: 8px 16px; }
    #btn-start {
      margin: 16px; padding: 12px;
      background: #6366f1; color: white;
      border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    #btn-start:hover { background: #4f46e5; }
    #btn-reset-editor {
      margin: 0 16px 12px;
      padding: 8px;
      background: transparent; color: #9ca3af;
      border: 1px solid #374151; border-radius: 8px;
      font-size: 0.82rem; cursor: pointer;
    }
    #btn-reset-editor:hover { color: #e5e7eb; border-color: #6b7280; }
    #draw-hint {
      padding: 8px 16px; font-size: 0.78rem; color: #6b7280;
      line-height: 1.5;
    }

    /* Simulation HUD */
    #sim-hud {
      position: fixed; top: 16px; right: 16px;
      display: none; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    .hud-row { display: flex; gap: 6px; }
    .hud-btn {
      padding: 7px 14px; font-size: 0.82rem;
      background: rgba(31,41,55,.85); color: #e5e7eb;
      border: 1px solid #374151; border-radius: 8px;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: background .15s;
    }
    .hud-btn:hover  { background: rgba(55,65,81,.9); }
    .hud-btn.active { background: #6366f1; border-color: #6366f1; color: white; }
    #fps-counter {
      font-size: 0.72rem; color: #4b5563;
      padding: 4px 8px; background: rgba(17,24,39,.6);
      border-radius: 6px; backdrop-filter: blur(4px);
    }
    #region-overlay-sim {
      position: fixed; inset: 0; pointer-events: none;
      opacity: .35;
    }

    /* ── Simulation parameter panel (left side) ── */
    #sim-params-panel {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: 230px;
      background: rgba(17,24,39,.94);
      border-right: 1px solid #374151;
      display: none; flex-direction: column;
      overflow-y: auto;
      backdrop-filter: blur(12px);
      z-index: 30;
    }
    #sim-params-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #374151;
      font-size: .9rem; font-weight: 600;
    }
    #btn-close-params {
      background: none; border: none; color: #6b7280;
      cursor: pointer; font-size: 1.05rem; line-height: 1;
      padding: 2px 4px; border-radius: 4px;
    }
    #btn-close-params:hover { color: #e5e7eb; background: rgba(255,255,255,.08); }
    #sim-params-list { padding: 8px; }
  </style>
</head>
<body>

<!-- ── 1. Upload screen ───────────────────────── -->
<div id="upload-screen">
  <h1>Elastic 2D</h1>
  <p>이미지를 불러와서 부위별 탄성을 설정하고 늘려보세요</p>
  <div id="drop-zone">
    <div class="icon">&#128444;</div>
    <div>이미지를 여기에 드래그하거나 클릭해서 선택</div>
    <div class="hint">JPG · PNG · WebP 지원</div>
  </div>
</div>

<!-- ── 2. Region editor screen ───────────────── -->
<div id="editor-screen">
  <div id="editor-canvas-wrap">
    <!-- floating toolbar -->
    <div id="editor-toolbar">
      <button class="tool-btn active" id="tool-draw" title="그리기 (D)">✏️</button>
      <button class="tool-btn"        id="tool-move" title="이동 (M)">🖐</button>
    </div>
    <img id="editor-img" />
    <canvas id="region-canvas"></canvas>
    <canvas id="editor-overlay-canvas"></canvas>
  </div>
  <div id="editor-panel">
    <h2>부위 탄성 설정</h2>

    <div class="panel-section">
      <label>신체 부위 선택</label>
      <select id="part-select">
        <option value="cheek">볼 (cheek)</option>
        <option value="nose">코 (nose)</option>
        <option value="chin">턱 (chin)</option>
        <option value="forehead">이마 (forehead)</option>
        <option value="ear">귀 (ear)</option>
        <option value="lip">입술 (lip)</option>
        <option value="neck">목 (neck)</option>
        <option value="arm">팔 (arm)</option>
        <option value="belly">배 (belly)</option>
        <option value="custom">커스텀</option>
      </select>
    </div>

    <div class="panel-section" id="custom-panel" style="display:none">
      <label>탄성 강도: <span id="custom-val">50</span></label>
      <input type="range" id="custom-slider" min="1" max="100" value="50" step="1" />
    </div>

    <div id="draw-hint">
      이미지 위에서 드래그해서<br>원형 영역을 그려보세요
    </div>

    <div id="regions-list"></div>

    <button id="btn-start">시뮬레이션 시작</button>
    <button id="btn-reset-editor">처음으로</button>
  </div>
</div>

<!-- ── 3. Three.js canvas ─────────────────────── -->
<div id="canvas-container"></div>
<canvas id="region-overlay-sim"></canvas>

<!-- ── 4a. Simulation parameter panel ────────── -->
<div id="sim-params-panel">
  <div id="sim-params-panel-header">
    <span>파라미터 조절</span>
    <button id="btn-close-params" title="닫기">✕</button>
  </div>
  <div id="sim-params-list"></div>
</div>

<!-- ── 4b. Simulation HUD ─────────────────────── -->
<div id="sim-hud">
  <div class="hud-row">
    <button class="hud-btn" id="btn-edit-regions">영역 편집</button>
    <button class="hud-btn" id="btn-reset-sim">메시 초기화</button>
    <button class="hud-btn" id="btn-params">파라미터</button>
  </div>
  <div class="hud-row">
    <button class="hud-btn active" id="btn-medium" data-substeps="10">Medium</button>
    <button class="hud-btn" id="btn-high" data-substeps="20">High</button>
  </div>
  <div id="fps-counter">FPS: --</div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════
//  BODY PART PRESETS
// ═══════════════════════════════════════════════
// Compliance in physical XPBD units (used with / sdt² in solver).
// edgeC controls stretchiness; areaC controls spring-back speed.
// Rules of thumb (sdt ≈ 1/600 s):
//   alpha = compliance / sdt²;  smaller alpha = stiffer
//   edgeC 1e-5 → stiff,  1e-4 → soft,  5e-4 → very squishy
//   areaC 1e-7 → fast snap-back,  1e-6 → slow bounce
// restC = per-vertex spring to rest position (the "skin spring-back" force)
// Lower restC → faster snap-back.   Higher restC → slow elastic return.
// With sdt≈1/600s: restC=5e-5→~0.2s,  5e-4→~1.5s,  2e-3→~3.5s to 95% return
const PRESETS = {
  cheek:    { label:'볼',    edgeC: 2e-4,   restC: 8e-4,  color:'#f87171' },
  nose:     { label:'코',    edgeC: 6e-5,   restC: 3e-4,  color:'#fb923c' },
  chin:     { label:'턱',    edgeC: 1e-4,   restC: 4e-4,  color:'#facc15' },
  forehead: { label:'이마',  edgeC: 3e-5,   restC: 2e-4,  color:'#4ade80' },
  ear:      { label:'귀',    edgeC: 8e-5,   restC: 4e-4,  color:'#60a5fa' },
  lip:      { label:'입술',  edgeC: 1.5e-4, restC: 6e-4,  color:'#c084fc' },
  neck:     { label:'목',    edgeC: 2e-5,   restC: 1e-4,  color:'#67e8f9' },
  arm:      { label:'팔',    edgeC: 1.5e-4, restC: 8e-4,  color:'#6ee7b7' },
  belly:    { label:'배',    edgeC: 3e-4,   restC: 2e-3,  color:'#f9a8d4' },
  custom:   { label:'커스텀',edgeC: 1e-4,   restC: 5e-4,  color:'#a3e635' }
};
const BG_EDGE_C = 2e-5;  // moderate background stiffness
const BG_REST_C = 5e-5;  // background snaps back in ~0.2 s

// ═══════════════════════════════════════════════
//  MESH GENERATOR (2D grid)
// ═══════════════════════════════════════════════
function generateGridMesh(worldW, worldH, segX, segY) {
  const nX = segX + 1, nY = segY + 1;
  const nV = nX * nY;

  const pos   = new Float32Array(nV * 3);
  const imgUV = new Float32Array(nV * 2); // (0,0)=top-left
  const texUV = new Float32Array(nV * 2); // Three.js: (0,0)=bottom-left

  for (let j = 0; j < nY; j++) {
    for (let i = 0; i < nX; i++) {
      const idx = j * nX + i;
      const u = i / segX, v = j / segY;
      pos[idx*3]   = (u - 0.5) * worldW;
      pos[idx*3+1] = (0.5 - v) * worldH;
      pos[idx*3+2] = 0;
      imgUV[idx*2]   = u;
      imgUV[idx*2+1] = v;       // image V: 0=top
      texUV[idx*2]   = u;
      texUV[idx*2+1] = 1 - v;   // Three.js V: 0=bottom
    }
  }

  // Triangles (2 per cell) — must be Uint16/Uint32 for WebGL index buffer
  const tris = new Uint16Array(segX * segY * 6);
  let ti = 0;
  for (let j = 0; j < segY; j++) {
    for (let i = 0; i < segX; i++) {
      const a = j * nX + i, b = a + 1, c = a + nX, d = c + 1;
      tris[ti++]=a; tris[ti++]=b; tris[ti++]=c;
      tris[ti++]=b; tris[ti++]=d; tris[ti++]=c;
    }
  }

  // Edges: structural (H, V) + shear diagonals
  const edgeSet = new Set();
  const edgePairs = [];
  function addEdge(a, b) {
    const k = Math.min(a,b)*nV + Math.max(a,b);
    if (!edgeSet.has(k)) { edgeSet.add(k); edgePairs.push(a, b); }
  }
  for (let j = 0; j < nY; j++) {
    for (let i = 0; i < nX; i++) {
      const idx = j * nX + i;
      if (i < segX)               addEdge(idx, idx + 1);
      if (j < segY)               addEdge(idx, idx + nX);
      if (i < segX && j < segY)   addEdge(idx, idx + nX + 1);
      if (i > 0    && j < segY)   addEdge(idx, idx + nX - 1);
    }
  }

  return { pos, imgUV, texUV, tris,
    edges: new Int32Array(edgePairs), nV, nX, nY, worldW, worldH };
}

// ═══════════════════════════════════════════════
//  SOFTBODY 2D (XPBD)
// ═══════════════════════════════════════════════
class SoftBody2D {
  constructor(meshData, texture, regions) {
    this.nV      = meshData.nV;
    this.pos     = new Float32Array(meshData.pos);   // live positions
    this.rest    = new Float32Array(meshData.pos);   // rest positions (for reset)
    this.prevPos = new Float32Array(meshData.pos);
    this.vel     = new Float32Array(meshData.pos.length);
    this.edgeIds = meshData.edges;
    this.triIds  = meshData.tris;

    // Store UV for real-time compliance refresh
    this.imgUV = meshData.imgUV;

    // Per-vertex compliance from region definitions
    this.vEdgeC = new Float32Array(this.nV);
    this.vRestC = new Float32Array(this.nV);
    this.invMass = new Float32Array(this.nV).fill(1.0);
    this._applyCompliance(regions);   // sets vEdgeC, vRestC, invMass

    // Precompute rest lengths
    this.restLengths = this._computeRestLengths();

    this.grabId = -1;
    this.grabOrigInvMass = 0;

    // Three.js geometry (shares pos buffer)
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3));
    geo.setAttribute('uv',       new THREE.BufferAttribute(meshData.texUV, 2));
    geo.setIndex(new THREE.BufferAttribute(meshData.tris, 1));

    const mat = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
    this.mesh = new THREE.Mesh(geo, mat);
    this.geo  = geo;
  }

  simulate(dt, substeps) {
    const sdt = dt / substeps;
    for (let s = 0; s < substeps; s++) {
      this._predict(sdt);
      this._solveEdges(sdt);
      this._solveRestSprings(sdt);
      this._updateVel(sdt);
      this._applyGrab();   // override grabbed verts AFTER physics each substep
    }
    this.geo.attributes.position.needsUpdate = true;
  }

  _predict(sdt) {
    const DAMP = 0.98;
    for (let i = 0; i < this.nV; i++) {
      if (this.invMass[i] === 0) continue;
      const b = i*3;
      this.vel[b]   *= DAMP;
      this.vel[b+1] *= DAMP;
      this.prevPos[b]   = this.pos[b];
      this.prevPos[b+1] = this.pos[b+1];
      this.pos[b]   += this.vel[b]   * sdt;
      this.pos[b+1] += this.vel[b+1] * sdt;
    }
  }

  _solveEdges(sdt) {
    const eIds = this.edgeIds;
    const nE   = eIds.length >> 1;
    for (let e = 0; e < nE; e++) {
      const i0 = eIds[e*2], i1 = eIds[e*2+1];
      const w0 = this.invMass[i0], w1 = this.invMass[i1];
      if (w0 + w1 === 0) continue;

      const dx = this.pos[i1*3]   - this.pos[i0*3];
      const dy = this.pos[i1*3+1] - this.pos[i0*3+1];
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 1e-10) continue;

      const C     = d - this.restLengths[e];
      const alpha = (this.vEdgeC[i0] + this.vEdgeC[i1]) * 0.5 / (sdt * sdt);
      const s     = -C / (w0 + w1 + alpha);
      const nx = dx/d, ny = dy/d;

      this.pos[i0*3]   -= w0 * s * nx;
      this.pos[i0*3+1] -= w0 * s * ny;
      this.pos[i1*3]   += w1 * s * nx;
      this.pos[i1*3+1] += w1 * s * ny;
    }
  }

  // Per-vertex spring to rest position — the primary skin spring-back force.
  // XPBD point constraint: C_i = |pos_i - rest_i| = 0
  // Correction: Δpos_i = w_i / (w_i + alpha_i) * (rest_i - pos_i)
  _solveRestSprings(sdt) {
    for (let i = 0; i < this.nV; i++) {
      if (this.invMass[i] === 0) continue;
      // restC=0 → factor=1 → 즉시 원위치 (완전 강체)
      const factor = this.vRestC[i] === 0
        ? 1.0
        : this.invMass[i] / (this.invMass[i] + this.vRestC[i] / (sdt * sdt));
      this.pos[i*3]   += factor * (this.rest[i*3]   - this.pos[i*3]);
      this.pos[i*3+1] += factor * (this.rest[i*3+1] - this.pos[i*3+1]);
    }
  }

  _updateVel(sdt) {
    for (let i = 0; i < this.nV; i++) {
      if (this.invMass[i] === 0) continue;
      this.vel[i*3]   = (this.pos[i*3]   - this.prevPos[i*3])   / sdt;
      this.vel[i*3+1] = (this.pos[i*3+1] - this.prevPos[i*3+1]) / sdt;
    }
  }

  // Internal: write vEdgeC/vRestC/invMass from a regions array.
  // invMass=0 → rigid (edgeC=0), invMass=1 → normal.
  // During an active grab some invMasses are 0 for grab-pinning; we
  // must not clobber those, so refreshCompliance guards against it.
  _applyCompliance(regions) {
    for (let i = 0; i < this.nV; i++) {
      const { edgeC, restC } = getVertexCompliance(
        this.imgUV[i*2], this.imgUV[i*2+1], regions);
      this.vEdgeC[i] = edgeC;
      this.vRestC[i] = restC;
      this.invMass[i] = (edgeC === 0) ? 0 : 1.0;
    }
  }

  // Public: call whenever appRegions changes while simulation is running.
  refreshCompliance(regions) {
    if (this.grabActive) return;   // don't clobber grab-pinned invMasses
    this._applyCompliance(regions);
  }

  _computeRestLengths() {
    const n = this.edgeIds.length >> 1;
    const L = new Float32Array(n);
    for (let e = 0; e < n; e++) {
      const i0 = this.edgeIds[e*2], i1 = this.edgeIds[e*2+1];
      const dx = this.pos[i1*3]-this.pos[i0*3];
      const dy = this.pos[i1*3+1]-this.pos[i0*3+1];
      L[e] = Math.sqrt(dx*dx + dy*dy);
    }
    return L;
  }

  // ---------- multi-vertex skin grab ----------
  // startGrab collects all vertices within `radius` world units of (gx,gy),
  // weights them by a cosine falloff (centre=1, edge=0), pins them (invMass=0)
  // and stores their rest offsets.  Returns true if anything was grabbed.
  startGrab(gx, gy, radius, maxDrag) {
    this.grabActive  = false;
    this.grabData    = [];
    this.grabStartX  = gx;
    this.grabStartY  = gy;
    this.grabCurrX   = gx;
    this.grabCurrY   = gy;
    this.grabMaxDrag = maxDrag;

    // If the grab centre lands on a rigid vertex, cancel the grab entirely.
    // (Otherwise the radius would still pull the soft surrounding area.)
    let minD2 = Infinity, nearestEdgeC = BG_EDGE_C;
    for (let i = 0; i < this.nV; i++) {
      const dx = this.pos[i*3] - gx, dy = this.pos[i*3+1] - gy;
      const d2 = dx*dx + dy*dy;
      if (d2 < minD2) { minD2 = d2; nearestEdgeC = this.vEdgeC[i]; }
    }
    if (nearestEdgeC === 0) return false;   // rigid region — don't grab

    const r2 = radius * radius;
    for (let i = 0; i < this.nV; i++) {
      // invMass===0 → rigid (permanently fixed) or grabbed elsewhere → skip
      if (this.invMass[i] === 0) continue;

      const dx = this.pos[i*3] - gx, dy = this.pos[i*3+1] - gy;
      const d2 = dx*dx + dy*dy;
      if (d2 <= r2) {
        const t = Math.sqrt(d2) / radius;
        // cosine falloff: 1 at centre, 0 at edge — smooth "blob" displacement
        const w = Math.cos(t * Math.PI * 0.5);
        this.grabData.push({
          id: i, weight: w,
          origX: this.pos[i*3], origY: this.pos[i*3+1],
          savedInvMass: this.invMass[i]
        });
        this.invMass[i] = 0;  // pin so physics doesn't fight the grab override
      }
    }
    if (this.grabData.length > 0) { this.grabActive = true; return true; }
    return false;
  }

  moveGrabbed(wx, wy) {
    if (!this.grabActive) return;
    // Clamp drag distance so the pull can't go too far
    let dx = wx - this.grabStartX, dy = wy - this.grabStartY;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > this.grabMaxDrag) { dx *= this.grabMaxDrag / d; dy *= this.grabMaxDrag / d; }
    this.grabCurrX = this.grabStartX + dx;
    this.grabCurrY = this.grabStartY + dy;
  }

  endGrab() {
    if (!this.grabActive) return;
    for (const gp of this.grabData) {
      this.invMass[gp.id]   = gp.savedInvMass;
      this.pos[gp.id*3+2]   = 0;   // lower z back to mesh plane
    }
    this.grabData   = [];
    this.grabActive = false;
  }

  // Called every substep to keep grabbed verts at their weighted target position.
  // Also lifts grabbed verts in z so they always render in front of the rest.
  _applyGrab() {
    if (!this.grabActive) return;
    const dx = this.grabCurrX - this.grabStartX;
    const dy = this.grabCurrY - this.grabStartY;
    for (const gp of this.grabData) {
      this.pos[gp.id*3]   = gp.origX + dx * gp.weight;
      this.pos[gp.id*3+1] = gp.origY + dy * gp.weight;
      this.pos[gp.id*3+2] = gp.weight * 1.5;   // lift in front of mesh (z > 0)
      this.vel[gp.id*3]   = 0;
      this.vel[gp.id*3+1] = 0;
    }
  }
  resetToRest() {
    this.endGrab();        // release any active grab first
    this.pos.set(this.rest);
    this.prevPos.set(this.rest);
    this.vel.fill(0);
  }
}

// ═══════════════════════════════════════════════
//  GRABBER 2D
// ═══════════════════════════════════════════════
class Grabber2D {
  constructor(renderer, camera, bodies, worldW, worldH) {
    this.renderer   = renderer;
    this.camera     = camera;
    this.bodies     = bodies;
    // Grab radius: 15% of shorter world dim → thick skin blob
    // Max drag   : 40% of shorter world dim → realistic pull limit
    this.grabRadius = Math.min(worldW, worldH) * 0.15;
    this.maxDrag    = Math.min(worldW, worldH) * 0.40;
    this.active     = null;
    this._tmp = new THREE.Vector3();

    const el = renderer.domElement;
    el.addEventListener('pointerdown', e => this._down(e));
    window.addEventListener('pointermove', e => this._move(e));
    window.addEventListener('pointerup',   ()=> this._up());
  }

  _ndcToWorld(e) {
    const rect = this.renderer.domElement.getBoundingClientRect();
    const nx = ((e.clientX - rect.left) / rect.width)  * 2 - 1;
    const ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    this._tmp.set(nx, ny, 0).unproject(this.camera);
    return { x: this._tmp.x, y: this._tmp.y };
  }

  _down(e) {
    const { x, y } = this._ndcToWorld(e);
    for (const b of this.bodies) {
      if (b.startGrab(x, y, this.grabRadius, this.maxDrag)) {
        this.active = b;
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_) {}
        break;
      }
    }
  }
  _move(e) {
    if (!this.active) return;
    const { x, y } = this._ndcToWorld(e);
    this.active.moveGrabbed(x, y);
  }
  _up() {
    if (this.active) { this.active.endGrab(); this.active = null; }
  }
  setBodies(arr) { this.bodies = arr; }
}

// ═══════════════════════════════════════════════
//  REGION HELPERS
// ═══════════════════════════════════════════════
function getVertexCompliance(u, v, regions) {
  let edgeC = BG_EDGE_C, restC = BG_REST_C;
  for (const r of regions) {
    const du = u - r.cx, dv = v - r.cy;
    if (du*du + dv*dv <= r.r*r.r) {
      // 0(rigid)은 절대 우선 적용; 아니면 더 탄성적인(큰) 값 채택
      edgeC = (r.edgeC === 0 || edgeC === 0) ? 0 : Math.max(edgeC, r.edgeC);
      restC = (r.restC === 0 || restC === 0) ? 0 : Math.max(restC, r.restC);
    }
  }
  return { edgeC, restC };
}

// ── Tool state ──────────────────────────────────
let currentTool = 'draw';   // 'draw' | 'move'

function setTool(t) {
  currentTool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + t).classList.add('active');
  overlayCanvas.style.cursor = t === 'draw' ? 'crosshair' : 'default';
  // cancel any in-progress operation when switching
  drawing = false;
  movingIdx = -1;
  redrawEditorOverlay();
}
document.getElementById('tool-draw').addEventListener('click', () => setTool('draw'));
document.getElementById('tool-move').addEventListener('click', () => setTool('move'));
// Keyboard shortcuts D / M
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === 'd' || e.key === 'D') setTool('draw');
  if (e.key === 'm' || e.key === 'M') setTool('move');
});

// ── Draw-tool state ──────────────────────────────
let drawing = false, drawStart = null, drawCurrent = null;

// ── Move-tool state ──────────────────────────────
let movingIdx   = -1;       // index of region being dragged
let moveStartUV = null;     // UV at pointer-down
let moveOrigCX  = 0;        // region.cx before drag began
let moveOrigCY  = 0;        // region.cy before drag began

// returns index of topmost region that contains UV (u,v), or -1
function findRegionAt(u, v) {
  for (let i = appRegions.length - 1; i >= 0; i--) {
    const r = appRegions[i];
    const du = u - r.cx, dv = v - r.cy;
    if (du*du + dv*dv <= r.r*r.r) return i;
  }
  return -1;
}

function getImageRect() {
  // Read the ACTUAL rendered image rect from the browser layout.
  // This is always correct regardless of aspect ratio or display scaling.
  const wR = document.getElementById('editor-canvas-wrap').getBoundingClientRect();
  const iR = editorImg.getBoundingClientRect();
  return {
    ox: iR.left - wR.left,
    oy: iR.top  - wR.top,
    dW: iR.width,
    dH: iR.height
  };
}

function clientToImgUV(cx, cy) {
  const wrap = document.getElementById('editor-canvas-wrap');
  const wR   = wrap.getBoundingClientRect();
  const { ox, oy, dW, dH } = getImageRect();
  return {
    u: (cx - wR.left - ox) / dW,
    v: (cy - wR.top  - oy) / dH
  };
}

overlayCanvas.addEventListener('pointerdown', e => {
  overlayCanvas.setPointerCapture(e.pointerId);
  const uv = clientToImgUV(e.clientX, e.clientY);

  if (currentTool === 'draw') {
    drawing    = true;
    drawStart  = uv;
    drawCurrent = { ...uv };

  } else if (currentTool === 'move') {
    const idx = findRegionAt(uv.u, uv.v);
    if (idx >= 0) {
      movingIdx    = idx;
      moveStartUV  = uv;
      moveOrigCX   = appRegions[idx].cx;
      moveOrigCY   = appRegions[idx].cy;
      overlayCanvas.style.cursor = 'grabbing';
    }
  }
});

overlayCanvas.addEventListener('pointermove', e => {
  const uv = clientToImgUV(e.clientX, e.clientY);

  if (currentTool === 'draw') {
    if (!drawing) return;
    drawCurrent = uv;
    redrawEditorOverlay();

  } else if (currentTool === 'move') {
    if (movingIdx >= 0) {
      // drag: update region centre
      appRegions[movingIdx].cx = moveOrigCX + (uv.u - moveStartUV.u);
      appRegions[movingIdx].cy = moveOrigCY + (uv.v - moveStartUV.v);
      redrawRegionCanvas();
      redrawEditorOverlay();
    } else {
      // hover: change cursor when over a region
      overlayCanvas.style.cursor =
        findRegionAt(uv.u, uv.v) >= 0 ? 'grab' : 'default';
    }
  }
});

overlayCanvas.addEventListener('pointerup', () => {
  if (currentTool === 'draw') {
    if (!drawing) return;
    drawing = false;
    if (drawStart && drawCurrent) {
      const du = drawCurrent.u - drawStart.u;
      const dv = drawCurrent.v - drawStart.v;
      const r  = Math.sqrt(du*du + dv*dv);
      if (r > 0.01) {
        const key    = partSelect.value;
        const preset = PRESETS[key];
        let edgeC = preset.edgeC, restC = preset.restC;
        if (key === 'custom') {
          const t = parseInt(customSlider.value) / 100;
          edgeC = Math.pow(10, -5 + t * 1.7);
          restC = edgeC * 4;
        }
        appRegions.push({ cx: drawStart.u, cy: drawStart.v, r,
          edgeC, restC, color: preset.color, label: preset.label });
        renderRegionsList();
        redrawRegionCanvas();
      }
    }
    redrawEditorOverlay();

  } else if (currentTool === 'move') {
    movingIdx = -1;
    moveStartUV = null;
    overlayCanvas.style.cursor = 'default';
    renderRegionsList();   // update list order if needed
  }
});

function redrawEditorOverlay() {
  const ctx = overlayCanvas.getContext('2d');
  ctx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
  const { ox, oy, dW, dH } = getImageRect();

  // Draw tool: preview circle while dragging
  if (currentTool === 'draw' && drawing && drawStart && drawCurrent) {
    const du = drawCurrent.u - drawStart.u, dv = drawCurrent.v - drawStart.v;
    const r  = Math.sqrt(du*du + dv*dv);
    const col = PRESETS[partSelect.value].color;
    const cx  = ox + drawStart.u * dW;
    const cy  = oy + drawStart.v * dH;
    ctx.beginPath();
    ctx.ellipse(cx, cy, r * dW, r * dH, 0, 0, Math.PI*2);
    ctx.strokeStyle = col; ctx.lineWidth = 2;
    ctx.fillStyle   = col + '33';
    ctx.fill(); ctx.stroke();
  }

  // Move tool: highlight the region being dragged
  if (currentTool === 'move' && movingIdx >= 0) {
    const reg = appRegions[movingIdx];
    const cx  = ox + reg.cx * dW;
    const cy  = oy + reg.cy * dH;
    ctx.beginPath();
    ctx.ellipse(cx, cy, reg.r * dW, reg.r * dH, 0, 0, Math.PI*2);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 2.5;
    ctx.setLineDash([6, 3]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function redrawRegionCanvas() {
  const ctx = regionCanvas.getContext('2d');
  const { ox, oy, dW, dH } = getImageRect();
  ctx.clearRect(0, 0, regionCanvas.width, regionCanvas.height);
  for (const reg of appRegions) {
    const cx = ox + reg.cx * dW;
    const cy = oy + reg.cy * dH;
    ctx.beginPath();
    ctx.ellipse(cx, cy, reg.r * dW, reg.r * dH, 0, 0, Math.PI*2);
    ctx.strokeStyle = reg.color; ctx.lineWidth = 2;
    ctx.fillStyle   = reg.color + '30';
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = reg.color;
    ctx.font = '12px Segoe UI';
    ctx.fillText(reg.label, cx + reg.r * dW + 4, cy + 4);
  }
}

// ── Slider ↔ compliance conversion (log scale) ──────────────────────────────
// edgeC : 1e-5 (stiff) … 5e-4 (very stretchy)   slider 0–100
// restC : 5e-5 (fast)  … 3e-3 (very slow)        slider 0–100
const _EL = Math.log10(1e-5), _EH = Math.log10(5e-4);   // edge log range
const _RL = Math.log10(5e-5), _RH = Math.log10(3e-3);   // rest log range

// s=0  → compliance 0  (완전 강체 — 잡히지 않음, 즉시 복원)
// s=1+ → log scale 정상 매핑
function edgeCToSlider(v) { if (v === 0) return 0; return Math.max(1, Math.round(((Math.log10(Math.max(v,1e-6)) - _EL) / (_EH - _EL)) * 100)); }
function sliderToEdgeC(s) { return s === 0 ? 0 : Math.pow(10, _EL + (s / 100) * (_EH - _EL)); }
function restCToSlider(v) { if (v === 0) return 0; return Math.max(1, Math.round(((Math.log10(Math.max(v,1e-6)) - _RL) / (_RH - _RL)) * 100)); }
function sliderToRestC(s) { return s === 0 ? 0 : Math.pow(10, _RL + (s / 100) * (_RH - _RL)); }

function renderRegionsList() {
  regionsList.innerHTML = '';
  if (appRegions.length === 0) {
    regionsList.innerHTML = '<div style="padding:8px 16px;font-size:.78rem;color:#4b5563">아직 영역이 없습니다</div>';
    return;
  }
  appRegions.forEach((reg, idx) => {
    const eVal = edgeCToSlider(reg.edgeC);
    const rVal = restCToSlider(reg.restC);

    const div = document.createElement('div');
    div.className = 'region-item';
    div.innerHTML = `
      <div class="region-item-header">
        <div class="region-dot" style="background:${reg.color}"></div>
        <span>${reg.label}</span>
        <span class="region-del" data-idx="${idx}">&#xd7;</span>
      </div>
      <div class="region-sliders">
        <div class="rslider-row">
          <span class="rslider-label">탄성</span>
          <input type="range" class="r-edge-s" data-idx="${idx}"
                 min="0" max="100" value="${eVal}" />
          <span class="rslider-val r-edge-v">${eVal}</span>
        </div>
        <div class="rslider-row">
          <span class="rslider-label">복원</span>
          <input type="range" class="r-rest-s" data-idx="${idx}"
                 min="0" max="100" value="${rVal}" />
          <span class="rslider-val r-rest-v">${rVal}</span>
        </div>
      </div>`;
    regionsList.appendChild(div);

    // delete
    div.querySelector('.region-del').addEventListener('click', () => {
      appRegions.splice(idx, 1);
      renderRegionsList(); redrawRegionCanvas();
    });

    // edge slider — updates appRegions AND the live softbody immediately
    const edgeSlider = div.querySelector('.r-edge-s');
    const edgeVal    = div.querySelector('.r-edge-v');
    edgeSlider.addEventListener('input', () => {
      const s = parseInt(edgeSlider.value);
      edgeVal.textContent = s;
      appRegions[idx].edgeC = sliderToEdgeC(s);
      softbody?.refreshCompliance(appRegions);
    });

    // rest slider
    const restSlider = div.querySelector('.r-rest-s');
    const restVal    = div.querySelector('.r-rest-v');
    restSlider.addEventListener('input', () => {
      const s = parseInt(restSlider.value);
      restVal.textContent = s;
      appRegions[idx].restC = sliderToRestC(s);
      softbody?.refreshCompliance(appRegions);
    });
  });
}

function resizeEditorCanvases() {

function showEditor(img) {

// ═══════════════════════════════════════════════
//  START SIMULATION
// ═══════════════════════════════════════════════
document.getElementById('btn-start').addEventListener('click', () => {
  if (!loadedImage) return;
  startSimulation(loadedImage);
});

function startSimulation(img) {
  document.getElementById('editor-screen').style.display      = 'none';
  document.getElementById('canvas-container').style.display   = 'block';
  document.getElementById('sim-hud').style.display            = 'flex';
  document.getElementById('region-overlay-sim').style.display = '';
  // 파라미터 패널은 닫은 상태로 시작
  document.getElementById('sim-params-panel').style.display   = 'none';
  document.getElementById('btn-params').classList.remove('active');

  const W = img.naturalWidth, H = img.naturalHeight;
  const aspect = W / H;
  // Normalize: longer side = 2 world units
  const worldH = 2.0, worldW = worldH * aspect;

  // Three.js setup
  if (!renderer3) {
    renderer3 = new THREE.WebGLRenderer({ antialias: true });
    renderer3.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer3.domElement);
  }
  renderer3.setClearColor(0x111827);

  scene3  = new THREE.Scene();

  const vW = window.innerWidth, vH = window.innerHeight;
  // "contain" behaviour: show full image with padding if needed
  const winAsp = vW / vH, imgAsp = worldW / worldH;
  let camW, camH;
  if (winAsp > imgAsp) { camH = worldH; camW = worldH * winAsp; }
  else                 { camW = worldW; camH = worldW / winAsp; }
  camera3 = new THREE.OrthographicCamera(-camW/2, camW/2, camH/2, -camH/2, -10, 10);
  camera3.position.z = 1;

  renderer3.setSize(vW, vH);

  // Mesh quality
  const seg = numSubsteps >= 20 ? 80 : 60;

  // Texture from image
  const texture = new THREE.Texture(img);
  texture.needsUpdate = true;

  // Generate mesh
  const meshData = generateGridMesh(worldW, worldH, seg, seg);

  // Create soft body
  if (softbody) scene3.remove(softbody.mesh);
  softbody = new SoftBody2D(meshData, texture, appRegions);
  scene3.add(softbody.mesh);

  // Grabber — create once, then update properties on subsequent calls
  if (!grabber) {
    grabber = new Grabber2D(renderer3, camera3, [softbody], worldW, worldH);
  } else {
    grabber.renderer    = renderer3;
    grabber.camera      = camera3;
    grabber.grabRadius  = Math.min(worldW, worldH) * 0.15;
    grabber.maxDrag     = Math.min(worldW, worldH) * 0.40;
    grabber.setBodies([softbody]);
  }

  // Region overlay on simulation canvas
  drawSimRegionOverlay(worldW, worldH);

  // Window resize
  window._elasticResizeHandler && window.removeEventListener('resize', window._elasticResizeHandler);
  window._elasticResizeHandler = () => {
    const vW2 = window.innerWidth, vH2 = window.innerHeight;
    const wa2 = vW2 / vH2;
    let cW2, cH2;
    if (wa2 > imgAsp) { cH2 = worldH; cW2 = worldH * wa2; }
    else              { cW2 = worldW;  cH2 = worldW / wa2; }
    camera3.left = -cW2/2; camera3.right  = cW2/2;
    camera3.top  =  cH2/2; camera3.bottom = -cH2/2;
    camera3.updateProjectionMatrix();
    renderer3.setSize(vW2, vH2);
    drawSimRegionOverlay(worldW, worldH);
  };
  window.addEventListener('resize', window._elasticResizeHandler);

  if (!animRunning) { animRunning = true; requestAnimationFrame(loop); }
}

function drawSimRegionOverlay(worldW, worldH) {
  const cvs = document.getElementById('region-overlay-sim');
  cvs.width  = window.innerWidth;
  cvs.height = window.innerHeight;
  cvs.style.width  = window.innerWidth + 'px';
  cvs.style.height = window.innerHeight + 'px';
  if (appRegions.length === 0) return;

  const ctx = cvs.getContext('2d');
  ctx.clearRect(0, 0, cvs.width, cvs.height);

  // Map world coords → canvas pixels (must match camera "contain" logic)
  const wa = window.innerWidth / window.innerHeight;
  const ia = worldW / worldH;
  const cW = wa > ia ? worldH * wa : worldW;
  const cH = wa > ia ? worldH      : worldW / wa;
  function worldToCanvas(wx, wy) {
    return {
      px: ((wx / cW) + 0.5) * cvs.width,
      py: (0.5 - (wy / cH)) * cvs.height
    };
  }
  // UV to world
  function uvToWorld(u, v) {
    return { x: (u-0.5)*worldW, y: (0.5-v)*worldH };
  }

  for (const reg of appRegions) {
    const wc  = uvToWorld(reg.cx, reg.cy);
    const cp  = worldToCanvas(wc.x, wc.y);
    // reg.r is in UV units — convert separately for x and y
    // so the overlay ellipse matches the editor ellipse exactly
    const rPxX = (reg.r * worldW / cW) * cvs.width;
    const rPxY = (reg.r * worldH / cH) * cvs.height;
    ctx.beginPath();
    ctx.ellipse(cp.px, cp.py, rPxX, rPxY, 0, 0, Math.PI*2);
    ctx.strokeStyle = reg.color; ctx.lineWidth = 1.5;
    ctx.fillStyle   = reg.color + '18';
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = reg.color + 'cc'; ctx.font = '12px Segoe UI';
    ctx.fillText(reg.label, cp.px + rPxX + 4, cp.py + 4);
  }
}

// ═══════════════════════════════════════════════
//  ANIMATION LOOP
// ═══════════════════════════════════════════════
let prevTime = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  if (!softbody) return;

  const dt = Math.min((now - prevTime) / 1000, 1/30);
  prevTime = now;

  softbody.simulate(dt, numSubsteps);
  renderer3.render(scene3, camera3);

  // FPS
  frameCount++;
  if (now - lastFpsTime >= 1000) {
    document.getElementById('fps-counter').textContent =
      'FPS: ' + Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0; lastFpsTime = now;
  }
}

// ═══════════════════════════════════════════════
//  HUD BUTTONS
// ═══════════════════════════════════════════════
// ═══════════════════════════════════════════════
//  SIMULATION PARAMETER PANEL
// ═══════════════════════════════════════════════
function renderSimParamsList() {
  const container = document.getElementById('sim-params-list');
  container.innerHTML = '';
  if (appRegions.length === 0) {
    container.innerHTML =
      '<p style="font-size:.78rem;color:#4b5563;padding:8px 4px">설정된 영역이 없습니다.<br>편집 화면에서 먼저 영역을 그려주세요.</p>';
    return;
  }
  appRegions.forEach((reg, idx) => {
    const eVal = edgeCToSlider(reg.edgeC);
    const rVal = restCToSlider(reg.restC);
    const div = document.createElement('div');
    div.className = 'region-item';
    div.innerHTML = `
      <div class="region-item-header">
        <div class="region-dot" style="background:${reg.color}"></div>
        <span>${reg.label}</span>
      </div>
      <div class="region-sliders">
        <div class="rslider-row">
          <span class="rslider-label">탄성</span>
          <input type="range" class="r-edge-s" min="0" max="100" value="${eVal}" />
          <span class="rslider-val r-edge-v">${eVal}</span>
        </div>
        <div class="rslider-row">
          <span class="rslider-label">복원</span>
          <input type="range" class="r-rest-s" min="0" max="100" value="${rVal}" />
          <span class="rslider-val r-rest-v">${rVal}</span>
        </div>
      </div>`;
    container.appendChild(div);

    const edgeSlider = div.querySelector('.r-edge-s');
    const edgeVal    = div.querySelector('.r-edge-v');
    edgeSlider.addEventListener('input', () => {
      const s = parseInt(edgeSlider.value);
      edgeVal.textContent = s;
      appRegions[idx].edgeC = sliderToEdgeC(s);
      softbody?.refreshCompliance(appRegions);
    });

    const restSlider = div.querySelector('.r-rest-s');
    const restVal    = div.querySelector('.r-rest-v');
    restSlider.addEventListener('input', () => {
      const s = parseInt(restSlider.value);
      restVal.textContent = s;
      appRegions[idx].restC = sliderToRestC(s);
      softbody?.refreshCompliance(appRegions);
    });
  });
}

document.getElementById('btn-params').addEventListener('click', () => {
  const panel  = document.getElementById('sim-params-panel');
  const btn    = document.getElementById('btn-params');
  const isOpen = panel.style.display === 'flex';
  if (isOpen) {
    panel.style.display = 'none';
    btn.classList.remove('active');
  } else {
    renderSimParamsList();
    panel.style.display = 'flex';
    btn.classList.add('active');
  }
});

document.getElementById('btn-close-params').addEventListener('click', () => {
  document.getElementById('sim-params-panel').style.display = 'none';
  document.getElementById('btn-params').classList.remove('active');
});

document.getElementById('btn-edit-regions').addEventListener('click', () => {
  document.getElementById('canvas-container').style.display   = 'none';
  document.getElementById('sim-hud').style.display            = 'none';
  document.getElementById('region-overlay-sim').style.display = 'none';
  document.getElementById('sim-params-panel').style.display   = 'none';
  document.getElementById('btn-params').classList.remove('active');
  document.getElementById('editor-screen').style.display      = 'flex';
  setTimeout(resizeEditorCanvases, 50);
  renderRegionsList();   // 슬라이더 값 최신화
});

document.getElementById('btn-reset-sim').addEventListener('click', () => {
  if (softbody) softbody.resetToRest();
});

document.querySelectorAll('.hud-btn[data-substeps]').forEach(btn => {
  btn.addEventListener('click', () => {
    numSubsteps = parseInt(btn.dataset.substeps);
    document.querySelectorAll('.hud-btn[data-substeps]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // Rebuild mesh with updated resolution if needed
    if (loadedImage) startSimulation(loadedImage);
  });
});

document.getElementById('btn-reset-editor').addEventListener('click', () => {
  document.getElementById('editor-screen').style.display      = 'none';
  document.getElementById('canvas-container').style.display   = 'none';
  document.getElementById('sim-hud').style.display            = 'none';
  document.getElementById('region-overlay-sim').style.display = 'none';
  document.getElementById('sim-params-panel').style.display   = 'none';
  document.getElementById('upload-screen').style.display      = 'flex';
  appRegions = []; loadedImage = null;
  if (loadedImageUrl) { URL.revokeObjectURL(loadedImageUrl); loadedImageUrl = null; }
  renderRegionsList();
});
</script>
